tasks:
    - name: build and run docker container and generate TLS certs
      init: docker build -t jq-pilot-backend .
      before: sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout ./nginx/ssl/nginx-selfsigned.key -out ./nginx/ssl/nginx-selfsigned.crt -subj "/C=PE/ST=Lima/L=Lima/O=Acme Inc. /OU=IT Department/CN=acme.com" && sudo chown -R gitpod:gitpod nginx/ssl
      command: docker-compose up --build

ports:
    - port: 8080
      onOpen: open-preview
      name: instructions
